databases:
  - name: el-rullo-db
    databaseName: elrullo
    user: elrullo
    plan: free
    region: frankfurt
    postgresMajorVersion: "16"
    ipAllowList: []

services:
  - type: web
    name: el-rullo
    runtime: node
    plan: free
    region: frankfurt
    branch: main
    autoDeployTrigger: commit
    buildCommand: npm ci && npx prisma db push && npm run db:seed && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: el-rullo-db
          property: connectionString
      - key: ADMIN_PASSWORD
        sync: false
      - key: AUTH_SECRET
        generateValue: true
      - key: NEXT_PUBLIC_SITE_URL
        sync: false
